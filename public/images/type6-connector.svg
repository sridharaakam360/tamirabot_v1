<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="TYPE 6 — Vehicle Connector">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBFBFD"/>
      <stop offset="1" stop-color="#EEF0F6"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#24125F"/>
      <stop offset="1" stop-color="#3A2483"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <g transform="translate(400 270)">
    <!-- connector head -->
    <circle r="118" fill="#fff" stroke="#E5E7EB" stroke-width="2"/>
    <circle r="118" fill="url(#body)" opacity="0.06"/>
    <circle r="92" fill="none" stroke="#24125F" stroke-width="6" opacity="0.85"/>
    <!-- pins -->
    <g fill="#24125F">
      <circle cx="-40" cy="-34" r="15"/>
      <circle cx="40" cy="-34" r="15"/>
      <circle cx="-52" cy="34" r="12"/>
      <circle cx="52" cy="34" r="12"/>
      <circle cx="0" cy="50" r="13"/>
    </g>
    <circle cx="0" cy="-6" r="20" fill="#F04F54"/>
    <!-- handle stem -->
    <rect x="-26" y="116" width="52" height="78" rx="16" fill="url(#body)"/>
  </g>
  <rect x="300" y="486" width="200" height="6" rx="3" fill="#E5E7EB"/>
  <text x="400" y="540" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="-0.5" fill="#24125F">TYPE 6 — Vehicle Connector</text>
  <text x="400" y="572" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="2" fill="#F04F54">DC FAST CHARGING</text>
</svg>
